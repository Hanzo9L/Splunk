# savedsearches.conf
# Bank of America — Teams to Splunk Integration
# Deploy to: $SPLUNK_HOME/etc/apps/TA_teams_collector/local/savedsearches.conf
#
# Contains:
#   - Real-time and scheduled alerts (triggers, thresholds, notification actions)
#   - Scheduled reports (daily, weekly summaries)
#
# IMPORTANT: Update all YOUR INFORMATION GOES HERE values before enabling alerts.
# Email/webhook action destinations must match your BofA notification infrastructure.

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 1: MOS Score Degradation
# Triggers when 5-minute average MOS drops below 3.5 (poor quality threshold)
# Indicates network degradation, codec issues, or SBC media path problems
# ─────────────────────────────────────────────────────────────────────────────
[Teams - MOS Quality Degradation Alert]
search           = index=teams_quality sourcetype=teams:cqd:stream \
                   | stats avg(audio_mos) as avg_mos \
                   | where avg_mos < 3.5 \
                   | eval avg_mos=round(avg_mos,2) \
                   | eval alert_message="Teams audio quality is degraded. Avg MOS: ".avg_mos." (threshold: 3.5)"
cron_schedule    = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 3
alert.suppress   = 1
alert.suppress.period = 15m
counttype        = number of events
relation         = greater than
quantity         = 0
# Email notification — YOUR INFORMATION GOES HERE: update recipients
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [ALERT] BofA Teams - Audio Quality Degraded (MOS < 3.5)
action.email.message.alert = Teams audio quality has dropped below acceptable threshold.\n\nAverage MOS: $result.avg_mos$\nThreshold: 3.5 (Good quality)\n\nInvestigate: Call Quality Deep Dive dashboard.
action.email.useNSS = 0
# Webhook to Teams channel — YOUR INFORMATION GOES HERE: update Teams webhook URL
# action.webhook  = 1
# action.webhook.param.url = YOUR INFORMATION GOES HERE

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 2: Direct Routing High Failure Rate
# Triggers when DR call failure rate exceeds 5% in a 15-minute window
# Indicates SBC issues, carrier problems, or routing misconfigurations
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Direct Routing High Failure Rate]
search           = index=teams_calls sourcetype=teams:call:dr_record \
                   | eval failed=if(final_sip_code!=200 AND successfulCall!="true",1,0) \
                   | stats count as total, sum(failed) as failed_calls \
                   | eval failure_rate=round(failed_calls/total*100,1) \
                   | where failure_rate > 5 AND total > 10 \
                   | eval alert_message="DR failure rate: ".failure_rate."% (".failed_calls."/".total." calls)"
cron_schedule    = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 4
alert.suppress   = 1
alert.suppress.period = 15m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [CRITICAL] BofA Teams - Direct Routing Failure Rate > 5%
action.email.message.alert = Direct Routing failure rate has exceeded 5% threshold.\n\nFailure Rate: $result.failure_rate$%\nFailed Calls: $result.failed_calls$ / $result.total$\nPeriod: Last 15 minutes\n\nInvestigate: Direct Routing & PSTN Health dashboard.

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 3: SBC-Specific Failure Spike
# Triggers when a single SBC trunk exceeds 10% failure rate
# Helps isolate whether failures are trunk-specific or network-wide
# ─────────────────────────────────────────────────────────────────────────────
[Teams - SBC Trunk Failure Spike]
search           = index=teams_calls sourcetype=teams:call:dr_record \
                   | eval failed=if(final_sip_code!=200 AND successfulCall!="true",1,0) \
                   | stats count as total, sum(failed) as failed_calls by trunkFullyQualifiedDomainName \
                   | eval failure_rate=round(failed_calls/total*100,1) \
                   | where failure_rate > 10 AND total > 5 \
                   | lookup teams_trunk_metadata_lookup trunk_fqdn AS trunkFullyQualifiedDomainName OUTPUT sbc_name, carrier
cron_schedule    = */10 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 4
alert.suppress   = 1
alert.suppress.period = 20m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [CRITICAL] BofA Teams - SBC Trunk Failure Spike: $result.sbc_name$
action.email.message.alert = A specific SBC trunk has a high failure rate.\n\nSBC: $result.sbc_name$\nTrunk: $result.trunkFullyQualifiedDomainName$\nCarrier: $result.carrier$\nFailure Rate: $result.failure_rate$%

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 4: Off-Hours Admin Activity (Compliance)
# Triggers when Teams admin actions occur outside business hours
# Critical for BofA regulatory compliance and insider threat detection
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Off-Hours Admin Activity]
search           = index=teams_audit sourcetype=teams:audit:log \
                   operation IN ("PolicyAssigned","TeamSettingChanged","ChannelDeleted","TeamDeleted", \
                                 "MemberRoleChanged","BulkUpdate","MeetingSettingChanged") \
                   | eval hour=tonumber(strftime(_time,"%H")), dow=strftime(_time,"%w") \
                   | where (hour < 7 OR hour > 20) OR dow=0 OR dow=6 \
                   | eval event_time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
                   | lookup teams_user_dept_lookup user_upn OUTPUT department \
                   | table event_time, user_upn, department, operation, object_name
cron_schedule    = */15 * * * *
dispatch.earliest_time = -20m
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 3
alert.suppress   = 1
alert.suppress.period = 60m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [COMPLIANCE] BofA Teams - Off-Hours Admin Activity Detected
action.email.message.alert = Teams administrative changes detected outside business hours.\n\nUser: $result.user_upn$\nDepartment: $result.department$\nOperation: $result.operation$\nObject: $result.object_name$\nTime: $result.event_time$\n\nReview in Audit & Compliance dashboard.

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 5: Repeated Failed Operations (Possible Unauthorized Access Attempt)
# Triggers when the same user has 3+ failed operations in 10 minutes
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Repeated Failed Operations]
search           = index=teams_audit sourcetype=teams:audit:log \
                   (result="Failed" OR result="Failure") \
                   | stats count as failed_count by user_upn \
                   | where failed_count >= 3 \
                   | lookup teams_user_dept_lookup user_upn OUTPUT department
cron_schedule    = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 4
alert.suppress   = 1
alert.suppress.period = 30m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [SECURITY] BofA Teams - Repeated Failed Operations by $result.user_upn$
action.email.message.alert = A user has had multiple failed operations in Teams.\n\nUser: $result.user_upn$\nDepartment: $result.department$\nFailed Operations: $result.failed_count$ (last 10 minutes)\n\nThis may indicate an unauthorized access attempt. Investigate immediately.

# ─────────────────────────────────────────────────────────────────────────────
# ALERT 6: Collector Data Gap (Monitoring the monitors)
# Triggers if no events have arrived from a collector in 30 minutes
# Indicates collector failure, authentication expiry, or connectivity issue
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Collector Data Gap - Call Records]
search           = index=teams_calls sourcetype=teams:call:record \
                   | stats max(_time) as last_event \
                   | eval gap_minutes=round((now()-last_event)/60,0) \
                   | where gap_minutes > 30 \
                   | eval alert_message="No call records received in ".gap_minutes." minutes. Collector may be down."
cron_schedule    = */30 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 3
alert.suppress   = 1
alert.suppress.period = 60m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [WARN] BofA Teams Splunk - Call Records Collector Data Gap
action.email.message.alert = The Teams call records collector has stopped sending data.\n\nLast Event: $result.gap_minutes$ minutes ago\n\nCheck graph_call_collector.py on the Heavy Forwarder. Possible causes: token expiry, network issue, or script crash.

[Teams - Collector Data Gap - Audit Logs]
search           = index=teams_audit sourcetype=teams:audit:log \
                   | stats max(_time) as last_event \
                   | eval gap_minutes=round((now()-last_event)/60,0) \
                   | where gap_minutes > 30
cron_schedule    = */30 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time   = now
enableSched      = 1
alert.track      = 1
alert.severity   = 4
alert.suppress   = 1
alert.suppress.period = 60m
counttype        = number of events
relation         = greater than
quantity         = 0
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = [WARN] BofA Teams Splunk - Audit Log Collector Data Gap
action.email.message.alert = The Teams audit log collector has stopped sending data. This is a compliance risk.\n\nLast Event: $result.gap_minutes$ minutes ago\n\nCheck audit_collector.py on the Heavy Forwarder immediately.

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULED REPORT 1: Daily PSTN Usage Summary
# Delivered every morning with previous day's PSTN call statistics
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Daily PSTN Usage Summary]
search           = index=teams_calls sourcetype=teams:call:pstn \
                   | eval dur_min=duration_sec/60 \
                   | stats count as total_calls, \
                           sum(dur_min) as total_minutes, \
                           avg(dur_min) as avg_duration_min, \
                           dc(caller_number) as unique_callers \
                           by call_direction, call_category \
                   | eval total_minutes=round(total_minutes,0), avg_duration_min=round(avg_duration_min,1) \
                   | sort -total_calls
cron_schedule    = 0 7 * * 1-5
dispatch.earliest_time = -1d@d
dispatch.latest_time   = @d
enableSched      = 1
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = BofA Teams - Daily PSTN Usage Report $trigger_date$
action.email.sendresults = 1
action.email.format = csv
action.email.inline  = 1

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULED REPORT 2: Weekly Call Quality Summary
# Delivered every Monday with previous week's quality metrics per subnet/building
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Weekly Call Quality Summary]
search           = index=teams_quality sourcetype=teams:cqd:stream \
                   | stats avg(audio_mos) as avg_mos, \
                           avg(audio_jitter_ms) as avg_jitter, \
                           avg(packet_loss_rate)*100 as avg_pkt_loss, \
                           count as total_streams \
                           by caller_subnet \
                   | eval avg_mos=round(avg_mos,2), avg_jitter=round(avg_jitter,1), avg_pkt_loss=round(avg_pkt_loss,2) \
                   | lookup teams_subnet_building_lookup subnet_prefix AS caller_subnet OUTPUT building_name, region \
                   | sort avg_mos \
                   | table caller_subnet, building_name, region, avg_mos, avg_jitter, avg_pkt_loss, total_streams
cron_schedule    = 0 8 * * 1
dispatch.earliest_time = -7d@d
dispatch.latest_time   = @d
enableSched      = 1
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = BofA Teams - Weekly Call Quality Report (Week of $trigger_date$)
action.email.sendresults = 1
action.email.format = csv

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULED REPORT 3: Weekly Direct Routing Health Summary
# Monday morning DR health report for the migration team
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Weekly Direct Routing Health Summary]
search           = index=teams_calls sourcetype=teams:call:dr_record \
                   | eval failed=if(final_sip_code!=200 AND successfulCall!="true",1,0) \
                   | stats count as total, sum(failed) as failed_calls, \
                           avg(duration_sec) as avg_dur \
                           by trunkFullyQualifiedDomainName \
                   | eval failure_rate=round(failed_calls/total*100,1), avg_dur_min=round(avg_dur/60,1) \
                   | lookup teams_trunk_metadata_lookup trunk_fqdn AS trunkFullyQualifiedDomainName OUTPUT sbc_name, carrier \
                   | sort -total \
                   | table sbc_name, trunkFullyQualifiedDomainName, carrier, total, failed_calls, failure_rate, avg_dur_min
cron_schedule    = 0 8 * * 1
dispatch.earliest_time = -7d@d
dispatch.latest_time   = @d
enableSched      = 1
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = BofA Teams - Weekly Direct Routing Health Report
action.email.sendresults = 1
action.email.format = csv

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULED REPORT 4: Monthly Adoption Summary (for management)
# First Monday of the month — user adoption by department
# ─────────────────────────────────────────────────────────────────────────────
[Teams - Monthly Adoption Summary]
search           = index=teams_calls sourcetype=teams:call:record \
                   | lookup teams_user_dept_lookup user_upn AS caller_upn OUTPUT department, cost_center \
                   | stats dc(caller_upn) as active_users, count as total_calls, \
                           sum(duration_sec) as total_seconds \
                           by department, cost_center \
                   | eval total_hours=round(total_seconds/3600,1) \
                   | sort -active_users \
                   | table department, cost_center, active_users, total_calls, total_hours
cron_schedule    = 0 8 1 * *
dispatch.earliest_time = -1mon@mon
dispatch.latest_time   = @mon
enableSched      = 1
action.email     = 1
action.email.to  = YOUR INFORMATION GOES HERE
action.email.subject = BofA Teams - Monthly Adoption Report $trigger_date$
action.email.sendresults = 1
action.email.format = csv
action.email.inline  = 1
