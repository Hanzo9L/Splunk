# inputs.conf
# Bank of America — Teams to Splunk Integration
# Deploy this file to: $SPLUNK_HOME/etc/apps/TA_teams_collector/local/inputs.conf
#
# Each stanza runs a Python collector script as a Splunk scripted input.
# Adjust the script paths to match your Heavy Forwarder OS and deployment location.
#
# Windows path example:  C:\Program Files\SplunkUniversalForwarder\etc\apps\TA_teams_collector\bin\
# Linux path example:    /opt/splunkforwarder/etc/apps/TA_teams_collector/bin/
#
# See CONFIG_VARIABLES.md Section 4 for POLL_INTERVAL settings.

# ─────────────────────────────────────────────────────────────────────────────
# Graph API — Call Records & Direct Routing Logs
# Polls /communications/callRecords and /communications/callRecords/getDirectRoutingCalls
# ─────────────────────────────────────────────────────────────────────────────
[script://.\bin\graph_call_collector.py]
disabled    = false
interval    = 300
index       = teams_calls
sourcetype  = teams:call:record
source      = graph_api:call_records
host        = teams-collector
passAuth    = splunk-system-user

# ─────────────────────────────────────────────────────────────────────────────
# CQD API — Stream-Level Quality Metrics
# Polls CQD OData API for MOS, jitter, packet loss, RTT per media stream
# ─────────────────────────────────────────────────────────────────────────────
[script://.\bin\cqd_collector.py]
disabled    = false
interval    = 600
index       = teams_quality
sourcetype  = teams:cqd:stream
source      = cqd_api:streams
host        = teams-collector
passAuth    = splunk-system-user

# ─────────────────────────────────────────────────────────────────────────────
# Graph API — PSTN Call Logs
# Polls /communications/callRecords/getPstnCalls for carrier/trunk data
# ─────────────────────────────────────────────────────────────────────────────
[script://.\bin\pstn_collector.py]
disabled    = false
interval    = 300
index       = teams_calls
sourcetype  = teams:call:pstn
source      = graph_api:pstn_calls
host        = teams-collector
passAuth    = splunk-system-user

# ─────────────────────────────────────────────────────────────────────────────
# M365 Management Activity API — Teams Audit Logs
# Polls Office 365 activity feed for Teams audit events
# ─────────────────────────────────────────────────────────────────────────────
[script://.\bin\audit_collector.py]
disabled    = false
interval    = 300
index       = teams_audit
sourcetype  = teams:audit:log
source      = mgmt_api:audit_teams
host        = teams-collector
passAuth    = splunk-system-user

# ─────────────────────────────────────────────────────────────────────────────
# HEC monitor stanza — ensure HEC is enabled on the Heavy Forwarder
# The collectors send directly to the Indexer HEC, not through this forwarder's HEC.
# This stanza is informational; actual HEC config is on the Indexer.
# ─────────────────────────────────────────────────────────────────────────────
# [http]
# disabled = false
# port = 8088
# enableSSL = true
