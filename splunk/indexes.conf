# indexes.conf
# Bank of America — Teams to Splunk Integration
# Deploy this file to: $SPLUNK_HOME/etc/apps/TA_teams_collector/local/indexes.conf
# OR to the Indexer cluster's _cluster app for distributed deployments.
#
# See CONFIG_VARIABLES.md Section 2 for index name customization.

# ─────────────────────────────────────────────────────────────────────────────
# teams_calls — Call records, PSTN logs, Direct Routing session data
# ─────────────────────────────────────────────────────────────────────────────
[teams_calls]
homePath   = $SPLUNK_DB/teams_calls/db
coldPath   = $SPLUNK_DB/teams_calls/colddb
thawedPath = $SPLUNK_DB/teams_calls/thaweddb
# Retain 2 years of call data (BofA compliance requirement — adjust per policy)
frozenTimePeriodInSecs = 63072000
# Max index size — adjust based on your call volume (estimate: ~500MB/month for 10k users)
maxTotalDataSizeMB = 20480
maxHotBuckets = 3
maxWarmDBCount = 300

# ─────────────────────────────────────────────────────────────────────────────
# teams_quality — CQD stream-level quality data (MOS, jitter, packet loss, RTT)
# ─────────────────────────────────────────────────────────────────────────────
[teams_quality]
homePath   = $SPLUNK_DB/teams_quality/db
coldPath   = $SPLUNK_DB/teams_quality/colddb
thawedPath = $SPLUNK_DB/teams_quality/thaweddb
# Quality data is high-volume — retain 90 days by default (adjust per storage)
frozenTimePeriodInSecs = 7776000
maxTotalDataSizeMB = 51200
maxHotBuckets = 6
maxWarmDBCount = 300

# ─────────────────────────────────────────────────────────────────────────────
# teams_audit — M365 Management Activity API: Teams audit & compliance events
# ─────────────────────────────────────────────────────────────────────────────
[teams_audit]
homePath   = $SPLUNK_DB/teams_audit/db
coldPath   = $SPLUNK_DB/teams_audit/colddb
thawedPath = $SPLUNK_DB/teams_audit/thaweddb
# Audit logs: retain 7 years (BofA regulatory requirement — adjust per compliance)
frozenTimePeriodInSecs = 220752000
maxTotalDataSizeMB = 10240
maxHotBuckets = 3
maxWarmDBCount = 300

# ─────────────────────────────────────────────────────────────────────────────
# teams_usage — User activity reports, device usage, adoption metrics
# ─────────────────────────────────────────────────────────────────────────────
[teams_usage]
homePath   = $SPLUNK_DB/teams_usage/db
coldPath   = $SPLUNK_DB/teams_usage/colddb
thawedPath = $SPLUNK_DB/teams_usage/thaweddb
# Usage reports: retain 1 year
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 5120
maxHotBuckets = 2
maxWarmDBCount = 200
