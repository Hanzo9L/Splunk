# transforms.conf
# Bank of America — Teams to Splunk Integration
# Deploy to: $SPLUNK_HOME/etc/apps/TA_teams_collector/local/transforms.conf
#
# Defines lookup tables and field transforms used across all Teams sourcetypes.

# ─────────────────────────────────────────────────────────────────────────────
# Lookup: User UPN → Department / Cost Center / Location
# Populate lookups/teams_user_dept.csv with your BofA HR/AD export.
# Columns: user_upn, department, cost_center, location, manager_upn
#
# YOUR INFORMATION GOES HERE — populate this CSV from your BofA Active Directory
# or HR system export. See lookups/teams_user_dept.csv.template for column format.
# ─────────────────────────────────────────────────────────────────────────────
[teams_user_dept_lookup]
filename      = teams_user_dept.csv
default_match = true
max_matches   = 1
case_sensitive_match = false

# ─────────────────────────────────────────────────────────────────────────────
# Lookup: SIP Response Code → Human-readable description
# Static lookup — no customization needed.
# ─────────────────────────────────────────────────────────────────────────────
[sip_response_code_lookup]
filename      = sip_response_codes.csv
default_match = true
max_matches   = 1

# ─────────────────────────────────────────────────────────────────────────────
# Lookup: Subnet → Building / Floor / Region
# Map internal IP subnets to physical locations for quality heatmaps.
#
# YOUR INFORMATION GOES HERE — populate lookups/teams_subnet_building.csv
# with your BofA network topology (subnet CIDR, building name, floor, region).
# This directly populates the "Call Quality by Location" heatmap dashboard.
# ─────────────────────────────────────────────────────────────────────────────
[teams_subnet_building_lookup]
filename      = teams_subnet_building.csv
default_match = true
max_matches   = 1
# Using CIDR matching requires the Splunk CIDR lookup app or custom command
# For simple /24 matching, use exact subnet prefix: e.g., "10.1.2" → Building A

# ─────────────────────────────────────────────────────────────────────────────
# Lookup: Trunk FQDN → SBC Name / Carrier / Region
# Maps Direct Routing trunk FQDNs to human-readable names for dashboards.
#
# YOUR INFORMATION GOES HERE — populate lookups/teams_trunk_metadata.csv
# with your Ribbon SBC FQDNs and associated metadata.
# ─────────────────────────────────────────────────────────────────────────────
[teams_trunk_metadata_lookup]
filename      = teams_trunk_metadata.csv
default_match = true
max_matches   = 1

# ─────────────────────────────────────────────────────────────────────────────
# Field alias: Normalize field names across sourcetypes for cross-index searches
# ─────────────────────────────────────────────────────────────────────────────
[teams_call_id_alias]
REGEX  = .
FORMAT = call_id::$1
SOURCE_KEY = call_id

# ─────────────────────────────────────────────────────────────────────────────
# Eval-based field: MOS quality band classification
# Used in Call Quality dashboard color-coding
# ─────────────────────────────────────────────────────────────────────────────
[teams_mos_quality_band]
REGEX        = "audio_mos"\s*:\s*([\d.]+)
FORMAT       = audio_mos::$1
SOURCE_KEY   = _raw
WRITE_META   = true
