# props.conf
# Bank of America — Teams to Splunk Integration
# Deploy to: $SPLUNK_HOME/etc/apps/TA_teams_collector/local/props.conf
#
# Defines sourcetype behavior, timestamp extraction, and field extractions
# for all Teams data sourcetypes.

# ─────────────────────────────────────────────────────────────────────────────
# teams:call:record — Graph API full call records (VoIP + Direct Routing)
# ─────────────────────────────────────────────────────────────────────────────
[teams:call:record]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "startDateTime"\s*:\s*"
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE             = 100000
# Pull key fields for faster search
EXTRACT-call_id      = "id"\s*:\s*"(?P<call_id>[^"]+)"
EXTRACT-call_type    = "type"\s*:\s*"(?P<call_type>[^"]+)"
EXTRACT-caller_upn   = "userPrincipalName"\s*:\s*"(?P<caller_upn>[^"@]+@[^"]+)"
EXTRACT-duration_sec = "durationSeconds"\s*:\s*(?P<duration_sec>\d+)
FIELDALIAS-duration  = duration_sec AS call_duration_seconds
# Lookup enrichment: resolve UPN to department
LOOKUP-dept = teams_user_dept_lookup user_upn AS caller_upn OUTPUT department cost_center location

# ─────────────────────────────────────────────────────────────────────────────
# teams:call:dr_record — Direct Routing specific call records
# ─────────────────────────────────────────────────────────────────────────────
[teams:call:dr_record]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "startDateTime"\s*:\s*"
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE             = 50000
EXTRACT-sbc_fqdn     = "mediaBypassEnabled"\s*:\s*(?:[^,]+),\s*"otherPartyCountryCode"\s*:\s*"[^"]*",\s*"signalingLocation"\s*:\s*"[^"]*",\s*"startDateTime"[^,]*,\s*"successfulCall"\s*:\s*(?P<successful_call>true|false)
EXTRACT-sip_code     = "finalSipCode"\s*:\s*(?P<final_sip_code>\d+)
EXTRACT-sbc          = "mediaReflexiveIPAddress"\s*:\s*"[^"]*"[^}]*"signalingLocation"\s*:\s*"(?P<sbc_location>[^"]+)"
LOOKUP-dept          = teams_user_dept_lookup user_upn AS callerNumber OUTPUT department cost_center

# ─────────────────────────────────────────────────────────────────────────────
# teams:call:pstn — PSTN call logs (carrier, trunk, duration, charge)
# ─────────────────────────────────────────────────────────────────────────────
[teams:call:pstn]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "startDateTime"\s*:\s*"
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE             = 50000
EXTRACT-caller_num   = "callerNumber"\s*:\s*"(?P<caller_number>[^"]+)"
EXTRACT-callee_num   = "calleeNumber"\s*:\s*"(?P<callee_number>[^"]+)"
EXTRACT-duration     = "duration"\s*:\s*(?P<duration_sec>\d+)
EXTRACT-trunk_name   = "trunkFullyQualifiedDomainName"\s*:\s*"(?P<trunk_fqdn>[^"]+)"
EVAL-call_direction  = if(match(caller_number, "^\+"), "outbound", "inbound")

# ─────────────────────────────────────────────────────────────────────────────
# teams:cqd:stream — CQD stream-level quality metrics
# ─────────────────────────────────────────────────────────────────────────────
[teams:cqd:stream]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "stream_start_time"\s*:\s*"
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE             = 50000
EXTRACT-mos          = "audio_mos"\s*:\s*(?P<audio_mos>[\d.]+)
EXTRACT-jitter       = "audio_jitter_ms"\s*:\s*(?P<audio_jitter_ms>[\d.]+)
EXTRACT-packet_loss  = "packet_loss_rate"\s*:\s*(?P<packet_loss_rate>[\d.]+)
EXTRACT-rtt          = "round_trip_time_ms"\s*:\s*(?P<round_trip_time_ms>[\d.]+)
EXTRACT-subnet       = "caller_subnet"\s*:\s*"(?P<caller_subnet>[^"]+)"
# Derived quality classification field
EVAL-quality_class   = case(audio_mos>=4.0,"Excellent", audio_mos>=3.5,"Good", audio_mos>=3.0,"Fair", audio_mos>=2.5,"Poor", isnotnull(audio_mos),"Bad", true(),"Unknown")

# ─────────────────────────────────────────────────────────────────────────────
# teams:audit:log — M365 Management Activity API Teams audit events
# ─────────────────────────────────────────────────────────────────────────────
[teams:audit:log]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "CreationTime"\s*:\s*"
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE             = 50000
EXTRACT-operation    = "Operation"\s*:\s*"(?P<operation>[^"]+)"
EXTRACT-user_upn     = "UserId"\s*:\s*"(?P<user_upn>[^"]+)"
EXTRACT-result       = "ResultStatus"\s*:\s*"(?P<result>[^"]+)"
EXTRACT-object_name  = "ObjectId"\s*:\s*"(?P<object_name>[^"]+)"
EXTRACT-workload     = "Workload"\s*:\s*"(?P<workload>[^"]+)"
LOOKUP-dept          = teams_user_dept_lookup user_upn OUTPUT department

# ─────────────────────────────────────────────────────────────────────────────
# teams:report:activity — Teams user activity summary reports
# ─────────────────────────────────────────────────────────────────────────────
[teams:report:activity]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "report_date"\s*:\s*"
TIME_FORMAT          = %Y-%m-%d
MAX_TIMESTAMP_LOOKAHEAD = 15
TRUNCATE             = 20000

# ─────────────────────────────────────────────────────────────────────────────
# teams:report:device — Teams device usage reports
# ─────────────────────────────────────────────────────────────────────────────
[teams:report:device]
SHOULD_LINEMERGE     = false
KV_MODE              = json
TIME_PREFIX          = "report_date"\s*:\s*"
TIME_FORMAT          = %Y-%m-%d
MAX_TIMESTAMP_LOOKAHEAD = 15
TRUNCATE             = 20000
